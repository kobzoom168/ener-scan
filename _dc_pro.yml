services:
  ener-scan:
    build: .
    container_name: ener-scan-pro
    restart: always
    ports:
      - "127.0.0.1:3100:3000"
    env_file: .env
    depends_on:
      - redis
      - postgrest
    networks:
      - ener-scan-pro-net

  worker-scan:
    build: .
    container_name: ener-scan-pro-worker-scan
    restart: always
    command: node src/workers/scanWorker.js
    env_file: .env
    depends_on:
      - redis
      - postgrest
    networks:
      - ener-scan-pro-net

  worker-delivery:
    build: .
    container_name: ener-scan-pro-worker-delivery
    restart: always
    command: node src/workers/deliveryWorker.js
    env_file: .env
    depends_on:
      - redis
      - postgrest
    networks:
      - ener-scan-pro-net

  worker-maintenance:
    build: .
    container_name: ener-scan-pro-worker-maintenance
    restart: always
    command: node src/workers/maintenanceWorker.js
    env_file: .env
    depends_on:
      - redis
      - postgrest
    networks:
      - ener-scan-pro-net

  postgrest:
    image: postgrest/postgrest
    container_name: ener-scan-pro-postgrest
    restart: always
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGREST_DB_PASSWORD}@host.docker.internal:5432/${LOCAL_PG_DB:-ener_scan}
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_JWT_SECRET: ${POSTGREST_JWT_SECRET}
      PGRST_SERVER_PORT: "3001"
      PGRST_LOG_LEVEL: warn
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ener-scan-pro-net

  redis:
    image: redis:7-alpine
    container_name: ener-scan-pro-redis
    restart: always
    volumes:
      - redis-data:/data
    networks:
      - ener-scan-pro-net

volumes:
  redis-data:

networks:
  ener-scan-pro-net:
    driver: bridge
