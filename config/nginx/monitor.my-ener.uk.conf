# OTP auth proxy (monitor-proxy :8081) — not Dozzle :8080 directly.
server {
    server_name monitor.my-ener.uk;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
        proxy_buffering off;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/monitor.my-ener.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/monitor.my-ener.uk/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = monitor.my-ener.uk) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name monitor.my-ener.uk;
    return 404;
}
