# Static Next.js export for https://my-ener.uk/ (Ener Scan — Lovable)
# Build: cd Web/ener-scan-website && npm run build
# Deploy out/ via Web/deploy.sh

server {
    listen 443 ssl;
    server_name my-ener.uk;

    root /var/www/ener-scan-web;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/my-ener.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/my-ener.uk/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    gzip on;
    gzip_vary on;
    gzip_types text/css application/javascript image/svg+xml application/json;

    location /_next/static/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location /images/ {
        add_header Cache-Control "public, max-age=86400, must-revalidate" always;
        try_files $uri =404;
    }

    location /videos/ {
        add_header Cache-Control "public, max-age=86400, must-revalidate" always;
        add_header Accept-Ranges bytes always;
        types {
            video/mp4 mp4;
        }
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name my-ener.uk;
    return 301 https://$host$request_uri;
}
