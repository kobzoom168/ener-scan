services:
  ener-scan:
    build: .
    container_name: ener-scan
    restart: always
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - redis
      - postgrest
    networks:
      - ener-scan-net

  worker-scan:
    build: .
    container_name: ener-scan-worker-scan
    restart: always
    command: node src/workers/scanWorker.js
    env_file: .env
    depends_on:
      - redis
      - postgrest
    networks:
      - ener-scan-net

  worker-delivery:
    build: .
    container_name: ener-scan-worker-delivery
    restart: always
    command: node src/workers/deliveryWorker.js
    env_file: .env
    depends_on:
      - redis
      - postgrest
    networks:
      - ener-scan-net

  worker-maintenance:
    build: .
    container_name: ener-scan-worker-maintenance
    restart: always
    command: node src/workers/maintenanceWorker.js
    env_file: .env
    depends_on:
      - redis
      - postgrest
    networks:
      - ener-scan-net

  postgrest:
    image: postgrest/postgrest
    container_name: ener-scan-postgrest
    restart: always
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGREST_DB_PASSWORD}@host.docker.internal:5432/${LOCAL_PG_DB:-ener_scan}
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_JWT_SECRET: ${POSTGREST_JWT_SECRET}
      PGRST_SERVER_PORT: "3001"
      PGRST_LOG_LEVEL: warn
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ener-scan-net

  redis:
    image: redis:7-alpine
    container_name: ener-scan-redis
    restart: always
    volumes:
      - redis-data:/data
    networks:
      - ener-scan-net

  dozzle:
    image: amir20/dozzle:latest
    container_name: ener-scan-dozzle
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - ener-scan-net

  monitor-proxy:
    build: .
    container_name: ener-scan-monitor-proxy
    restart: always
    command: node /app/monitor-proxy/index.mjs
    env_file: .env
    ports:
      - "127.0.0.1:8081:8081"
    depends_on:
      - redis
      - dozzle
    networks:
      - ener-scan-net

volumes:
  redis-data:

networks:
  ener-scan-net:
    driver: bridge
